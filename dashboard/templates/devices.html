{% extends "base.html" %}

{% block content %}

<h2>Devices</h2>


<table class="table table-striped table-bordered">

    <tr>

        <th>ID</th>
        <th>Name</th>
        <th>IP</th>
        <th>Type</th>
        <th>Location</th>

    </tr>


    {% for d in devices %}

    <tr>

        <td>{{ d[0] }}</td>
        <td>{{ d[1] }}</td>
        <td>{{ d[2] }}</td>
        <td>{{ d[3] }}</td>
        <td>{{ d[4] }}</td>

    </tr>

    {% endfor %}

</table>

{% endblock %}
